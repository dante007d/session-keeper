<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>BEC DEV Attendance — Premium Club Session Tracker</title>
    <meta name="description" content="A premium, minimal attendance tracker for BEC DEV Club. Capture sessions and mark attendance with a focused, Apple-inspired interface." />
    <meta name="author" content="BEC DEV" />

    <meta property="og:title" content="BEC DEV Attendance" />
    <meta property="og:description" content="Track club session details and mark member attendance." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=VT323&display=swap" rel="stylesheet" />
    <script>
      // Apply theme before first paint to avoid FOUC
      (function () {
        try {
          var t = localStorage.getItem('bec.dev.theme');
          if (t !== 'light' && t !== 'dark') t = 'dark';
          var r = document.documentElement;
          r.classList.add(t);
          r.style.colorScheme = t;
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
